# Nginx reverse proxy — Production Service Lab
#
# Public entry point for the ride booking system.
# All external traffic enters here and is forwarded to the ride-booking service only.
# The driver-matching and ride-dispatch services have no location blocks —
# they are unreachable through Nginx.

# Reuse the client-supplied trace ID; mint a fresh one if absent.
map $http_x_request_id $trace_id {
    default $http_x_request_id;
    ""      $request_id;
}

# Custom access log — includes trace ID so Nginx logs can be correlated
# with the JSON logs produced by each service.
log_format traced '$remote_addr [$time_iso8601] "$request" '
                  'status=$status trace=$trace_id '
                  'upstream=$upstream_addr rt=${request_time}s';

server {
    listen 80 default_server;
    server_name _;

    server_tokens off;

    access_log /var/log/nginx/ride-booking_access.log traced;
    error_log  /var/log/nginx/ride-booking_error.log;

    location /nginx-health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        # Forward to the ride-booking service by discovery name, not IP
        proxy_pass http://ride-booking.internal:3001;

        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Propagate trace ID through the entire request chain
        proxy_set_header X-Request-ID      $trace_id;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
