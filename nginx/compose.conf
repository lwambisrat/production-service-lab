# Nginx reverse proxy for the Docker Compose deployment.
#
# Mounted at /etc/nginx/conf.d/default.conf inside the nginx container.
# Public entry point: listens on :80 (published to the host as :8080).
# Forwards only to ride-booking. driver-matching and ride-dispatch have no
# location blocks and no published ports, so they are unreachable from outside.
#
# Difference from the VM config: upstream is the COMPOSE SERVICE NAME
# (ride-booking) resolved by Docker's embedded DNS, not a .internal /etc/hosts
# name.

# Reuse a client-supplied X-Request-ID, or mint one at the front door.
map $http_x_request_id $trace_id {
    default $http_x_request_id;
    ""      $request_id;
}

log_format traced '$remote_addr [$time_iso8601] "$request" '
                  'status=$status trace=$trace_id '
                  'upstream=$upstream_addr rt=${request_time}s';

server {
    listen 80 default_server;
    server_name _;

    server_tokens off;

    # In containers, send logs to stdout/stderr so `docker compose logs nginx`
    access_log /dev/stdout traced;
    error_log  /dev/stderr warn;

    location /nginx-health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        # Forward to the ride-booking container by its Compose service name.
        proxy_pass http://ride-booking:3001;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Propagate the trace id into the service chain.
        proxy_set_header X-Request-ID      $trace_id;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
