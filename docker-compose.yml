# Containerized ride-booking flow.
#
# Same production behaviour as the VM/systemd version, different runtime:
#   - Nginx is the ONLY service that publishes a host port (8080 -> 80).
#   - ride-booking / driver-matching / ride-dispatch have NO published ports,
#     so they are unreachable from the host — they talk to each other only over
#     the internal Compose network, by SERVICE NAME (Docker DNS).
#   - Inside containers services bind 0.0.0.0; they
#     stay private because their ports are simply never published.
#
# Start:  docker compose up --build -d
# Logs:   docker compose logs -f
# Stop:   docker compose down

name: ride-booking-lab

services:
  # ---- public entry point: the only container with a published port ----
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"                     
    volumes:
      - ./nginx/compose.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ride-booking
    restart: unless-stopped            

  # ---- ride-booking — the booking API (internal; reached only via Nginx) ----
  ride-booking:
    build: .
    image: ride-lab                     
    working_dir: /app/services/ride-booking
    command: uvicorn app:app --host 0.0.0.0 --port 3001
    environment:
      SERVICE_PORT: "3001"
      DRIVER_MATCHING_URL: http://driver-matching:3002/driver/match  
      DOWNSTREAM_TIMEOUT: "5"
    depends_on:
      - driver-matching
    restart: unless-stopped

  # ---- driver-matching — internal only ----
  driver-matching:
    build: .
    image: ride-lab
    working_dir: /app/services/driver-matching
    command: uvicorn app:app --host 0.0.0.0 --port 3002
    environment:
      SERVICE_PORT: "3002"
      DISPATCH_URL: http://ride-dispatch:3003/ride/dispatch
      DOWNSTREAM_TIMEOUT: "5"
    depends_on:
      - ride-dispatch
    restart: unless-stopped

  # ---- ride-dispatch — internal only ----
  ride-dispatch:
    build: .
    image: ride-lab
    working_dir: /app/services/ride-dispatch
    command: uvicorn app:app --host 0.0.0.0 --port 3003
    environment:
      SERVICE_PORT: "3003"
      CALLBACK_URL: http://ride-booking:3001/ride/callback             
      DOWNSTREAM_TIMEOUT: "5"
    restart: unless-stopped

